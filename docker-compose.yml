services:
  files-fixer:
    build: .
    ports:
      # host:container — host port overridable via HOST_PORT (3000 was busy locally)
      - "${HOST_PORT:-3001}:3000"
    environment:
      PORT: "3000"
      # Where the real files live inside the container:
      LEFT_ROOT: /left
      RIGHT_ROOT: /right
      EVIDENCE_ROOT: /evidence
      # Checksum manifests:
      LEFT_CSV: /evidence/left.csv
      RIGHT_CSV: /evidence/right.csv
      # Prefix present in every CSV absolute_path (mapped onto the mounts):
      CSV_PATH_PREFIX: /mnt/data
      # Pristine Joomla sources (one subfolder per version) for core-file diffs:
      JOOMLA_ROOT: /joomla
      # Claude web shell: N isolated profile dirs live under this root (persisted
      # via the volume below). Set CLAUDE_SHELL: "0" to disable the shell.
      CLAUDE_PROFILES_ROOT: /claude-profiles
      CLAUDE_PROFILE_COUNT: "3"
      # Auto-close a shell session after this many ms with no keystrokes (0=never).
      CLAUDE_SHELL_IDLE_MS: "${CLAUDE_SHELL_IDLE_MS:-300000}"
    # The web shell already sandboxes each session (throwaway dir + permission
    # deny-rules). To ALSO enable Claude's bubblewrap OS sandbox for bash, bwrap
    # needs unprivileged user namespaces — uncomment to relax the container's
    # syscall filter so it can run (weakens the container's own isolation):
    # security_opt:
    #   - seccomp:unconfined
    #   - apparmor:unconfined
    volumes:
      # left is the trusted source — mount read-only so it can never be touched
      - ./sample/left:/left:ro
      # right is what we remediate — must be writable
      - ./sample/right:/right
      # evidence holds the CSVs, audit.log and backups — writable
      - ./sample/evidence:/evidence
      # pristine Joomla sources — read-only. Point at your own dir with
      #   JOOMLA_SRC=/path/to/joomla-sources docker compose up -d
      # (folder must hold one subfolder per version, e.g. Joomla-3.9.21/)
      - ${JOOMLA_SRC:-./sample/joomla}:/joomla:ro
      # Claude profiles (#1/#2/#3): persist logins + config across restarts.
      # Each `claude` run (CLI or web shell) picks one of these subdirs.
      - ./claude-profiles:/claude-profiles
    # For a real investigation, replace the ./sample/* host paths above with
    # your evidence/data mounts. left stays :ro, right and evidence stay writable.
